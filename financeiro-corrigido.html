<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEGAVISION — Financial Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="megavision-data.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --border:  #1e1e2e;
      --accent:  #7c3aed;
      --cyan:    #06b6d4;
      --gold:    #f59e0b;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --green:   #10b981;
      --red:     #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,.97); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 58px; }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; background: linear-gradient(135deg, var(--accent), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-back { color: var(--muted); font-size: 13px; text-decoration: none; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); transition: all .2s; }
    .nav-back:hover { color: var(--text); background: var(--border); }

    /* MENU */
    .menu { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto; position: sticky; top: 58px; z-index: 90; }
    .menu-btn { padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 13px; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all .2s; font-family: 'DM Sans', sans-serif; }
    .menu-btn.ativo { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* CONTEÚDO */
    .page { max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 16px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* INPUTS */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; }
    .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: 14px; outline: none; font-family: 'DM Sans', sans-serif; transition: border-color .2s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: #475569; }
    .field select option { background: var(--surface); color: var(--text); }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    /* BOTÕES */
    .btn { padding: 12px 22px; border-radius: 9px; font-weight: 700; font-size: 14px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,.4); color: #f87171; padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .btn-full { width: 100%; }

    /* DIVIDA ITEM */
    .divida-item { background: var(--bg); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 10px; padding: 16px; margin-bottom: 10px; }
    .divida-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .divida-nome { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text); }
    .divida-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
    .divida-stat { text-align: center; }
    .divida-stat-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .divida-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* KPIs */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; border-left: 4px solid var(--accent); }
    .kpi-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-top: 6px; }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }

    /* SIMULADOR */
    .sim-opcao { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; transition: all .3s; }
    .sim-opcao.melhor { border-color: var(--green); background: rgba(16,185,129,.06); }
    .sim-opcao.pior { border-color: var(--border); opacity: .7; }
    .sim-titulo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .sim-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .sim-row:last-child { border-bottom: none; }
    .sim-destaque { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
    .badge-melhor { background: rgba(16,185,129,.2); color: #34d399; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-pior { background: rgba(239,68,68,.15); color: #f87171; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

    /* PLANO MÊS A MÊS */
    .mes-bloco { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
    .mes-header { background: linear-gradient(135deg, #1a0533, #0d1f3c); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
    .mes-titulo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: #fff; }
    .mes-saldo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; }
    .pagamento-item { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .pagamento-item:last-child { border-bottom: none; }
    .pagamento-dia { background: var(--accent); color: #fff; font-weight: 800; font-size: 13px; padding: 4px 10px; border-radius: 6px; min-width: 40px; text-align: center; }
    .pagamento-info { flex: 1; margin: 0 14px; }
    .pagamento-nome { font-weight: 600; font-size: 14px; color: var(--text); }
    .pagamento-detalhe { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pagamento-valor { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; color: #f87171; }
    .mes-footer { background: rgba(16,185,129,.08); border-top: 1px solid rgba(16,185,129,.2); padding: 12px 18px; display: flex; justify-content: space-between; font-size: 13px; }

    /* PAINEL */
    .progresso-bar { background: var(--border); border-radius: 20px; height: 12px; margin: 8px 0; overflow: hidden; }
    .progresso-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width .5s; }
    .livre-banner { background: linear-gradient(135deg, #7c3aed, #06b6d4); border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 20px; }
    .livre-banner h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .livre-banner p { color: rgba(255,255,255,.8); font-size: 14px; }
    .livre-data { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #fff; margin: 10px 0; }

    /* ALERTA */
    .alerta { padding: 14px 18px; border-radius: 10px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: flex-start; gap: 10px; }
    .alerta-info { background: rgba(6,182,212,.1); border: 1px solid rgba(6,182,212,.3); color: #22d3ee; }
    .alerta-warn { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: #fbbf24; }
    .alerta-ok { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #34d399; }

    /* VAZIO */
    .vazio { text-align: center; padding: 48px 20px; color: var(--muted); }
    .vazio-icon { font-size: 48px; margin-bottom: 12px; }
    .vazio h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }

    @media(max-width:600px) {
      .grid2, .grid3 { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .divida-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">⚡ MEGAVISION</a>
  <a href="index.html" class="nav-back">← Início</a>
</nav>

<div class="menu">
  <button class="menu-btn ativo" onclick="ir('painel')">📊 Painel</button>
  <button class="menu-btn" onclick="ir('situacao')">💳 Minhas Dívidas</button>
  <button class="menu-btn" onclick="ir('simulador')">⚖️ Simulador</button>
  <button class="menu-btn" onclick="ir('plano')">📅 Plano Mês a Mês</button>
</div>

<div id="conteudo" class="page"></div>

<!-- MODAL NOVA DÍVIDA -->
<div id="modalDivida" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#111118;border:1px solid #1e1e2e;border-radius:16px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;">
    <div style="background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:20px 24px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;">
      <h3 style="font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:17px;" id="modalDividaTitulo">➕ Nova Dívida</h3>
      <button onclick="fecharModal()" style="color:#fff;background:none;border:none;font-size:24px;cursor:pointer;">×</button>
    </div>
    <div style="padding:24px;">
      <div class="field"><label>Nome da Dívida</label><input type="text" id="dNome" placeholder="Ex: Cartão Nubank"></div>
      <div class="grid2">
        <div class="field"><label>Tipo</label>
          <select id="dTipo">
            <option value="cartao">💳 Cartão de Crédito</option>
            <option value="financiamento">🏍️ Financiamento</option>
            <option value="emprestimo">💰 Empréstimo</option>
            <option value="cheque">📄 Cheque Especial</option>
            <option value="outro">📋 Outro</option>
          </select>
        </div>
        <div class="field"><label>Dia Vencimento</label><input type="number" id="dDia" placeholder="Ex: 10" min="1" max="31"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Valor Total Devido (R$)</label><input type="number" id="dTotal" placeholder="0,00" step="0.01"></div>
        <div class="field"><label>Parcela Mensal (R$)</label><input type="number" id="dParcela" placeholder="0,00" step="0.01"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Juros ao Mês (%)</label><input type="number" id="dJuros" placeholder="Ex: 3.5" step="0.1" value="0"></div>
        <div class="field"><label>Parcelas Restantes</label><input type="number" id="dParcelas" placeholder="Ex: 12" min="1"></div>
      </div>
      <div class="field"><label>Observação (opcional)</label><input type="text" id="dObs" placeholder="Ex: Pode antecipar com 20% desconto"></div>
      <div id="alertModal" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;"></div>
      <button class="btn btn-primary btn-full" onclick="salvarDivida()">💾 Salvar Dívida</button>
    </div>
  </div>
</div>

<script>
const fmt = v => 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2});
const fmtN = v => parseFloat(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2});
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MESES_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let estado = {
  pagina: 'painel',
  renda: 0,
  dividas: [],
  editandoIdx: null
};

// ── PERSISTÊNCIA ──────────────────────────────────────────
async function salvarEstado() {
  await MVData.salvar('financeiro', { tipo: 'estado_financeiro', dados: { renda: estado.renda, dividas: estado.dividas } });
}

async function carregarEstado() {
  const r = await MVData.buscar('financeiro', { tipo: 'estado_financeiro' });
  if (r && r.length) {
    const d = r[0].dados || {};
    estado.renda = d.renda || 0;
    estado.dividas = d.dividas || [];
  }
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────
function ir(pagina) {
  estado.pagina = pagina;
  document.querySelectorAll('.menu-btn').forEach((b,i) => {
    const pags = ['painel','situacao','simulador','plano'];
    b.classList.toggle('ativo', pags[i] === pagina);
  });
  renderPagina();
}

function renderPagina() {
  const el = document.getElementById('conteudo');
  const renders = { painel: renderPainel, situacao: renderSituacao, simulador: renderSimulador, plano: renderPlano };
  el.innerHTML = renders[estado.pagina]();
}

// ── CÁLCULOS ──────────────────────────────────────────────
function calcTotais() {
  const totalDivida = estado.dividas.reduce((s,d) => s + (d.total||0), 0);
  const totalMensal = estado.dividas.reduce((s,d) => s + (d.parcela||0), 0);
  const sobra = estado.renda - totalMensal;
  const mesesParaLivre = totalMensal > 0 ? Math.ceil(totalDivida / totalMensal) : 0;
  return { totalDivida, totalMensal, sobra, mesesParaLivre };
}

function calcDataLivre(meses) {
  if (!meses) return '—';
  const d = new Date();
  d.setMonth(d.getMonth() + meses);
  return `${MESES_FULL[d.getMonth()]} de ${d.getFullYear()}`;
}

function calcSimulador() {
  if (estado.dividas.length < 2) return null;
  
  // Ordena por juros maior → Avalanche (economiza mais)
  const porJuros = [...estado.dividas].sort((a,b) => (b.juros||0) - (a.juros||0));
  // Ordena por menor saldo → Snowball (termina mais rápido)
  const porSaldo = [...estado.dividas].sort((a,b) => (a.total||0) - (b.total||0));
  
  const totalJuros = porJuros.reduce((s,d) => {
    const meses = d.parcelas || Math.ceil(d.total / (d.parcela||1));
    return s + (d.total * (d.juros/100) * meses);
  }, 0);

  return { avalanche: porJuros, snowball: porSaldo, economiAvalanche: totalJuros * 0.18 };
}

// ── MODAL ─────────────────────────────────────────────────
function abrirModal(idx = null) {
  estado.editandoIdx = idx;
  const modal = document.getElementById('modalDivida');
  if (idx !== null) {
    const d = estado.dividas[idx];
    document.getElementById('modalDividaTitulo').textContent = '✏️ Editar Dívida';
    document.getElementById('dNome').value = d.nome || '';
    document.getElementById('dTipo').value = d.tipo || 'cartao';
    document.getElementById('dDia').value = d.dia || '';
    document.getElementById('dTotal').value = d.total || '';
    document.getElementById('dParcela').value = d.parcela || '';
    document.getElementById('dJuros').value = d.juros || 0;
    document.getElementById('dParcelas').value = d.parcelas || '';
    document.getElementById('dObs').value = d.obs || '';
  } else {
    document.getElementById('modalDividaTitulo').textContent = '➕ Nova Dívida';
    ['dNome','dDia','dTotal','dParcela','dObs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('dTipo').value = 'cartao';
    document.getElementById('dJuros').value = 0;
    document.getElementById('dParcelas').value = '';
  }
  document.getElementById('alertModal').style.display = 'none';
  modal.style.display = 'flex';
}

function fecharModal() {
  document.getElementById('modalDivida').style.display = 'none';
  estado.editandoIdx = null;
}

async function salvarDivida() {
  const nome = document.getElementById('dNome').value.trim();
  const total = parseFloat(document.getElementById('dTotal').value);
  const parcela = parseFloat(document.getElementById('dParcela').value);
  const dia = parseInt(document.getElementById('dDia').value);

  if (!nome || !total || !parcela || !dia) {
    const al = document.getElementById('alertModal');
    al.style.display = 'block';
    al.textContent = '❌ Preencha nome, valores e dia de vencimento.';
    return;
  }

  const divida = {
    id: Date.now(),
    nome,
    tipo: document.getElementById('dTipo').value,
    dia,
    total,
    parcela,
    juros: parseFloat(document.getElementById('dJuros').value) || 0,
    parcelas: parseInt(document.getElementById('dParcelas').value) || Math.ceil(total/parcela),
    obs: document.getElementById('dObs').value.trim(),
    criado_em: new Date().toISOString()
  };

  if (estado.editandoIdx !== null) {
    divida.id = estado.dividas[estado.editandoIdx].id;
    estado.dividas[estado.editandoIdx] = divida;
  } else {
    estado.dividas.push(divida);
  }

  await salvarEstado();
  fecharModal();
  renderPagina();
}

async function excluirDivida(idx) {
  if (!confirm('Excluir esta dívida?')) return;
  estado.dividas.splice(idx, 1);
  await salvarEstado();
  renderPagina();
}

async function salvarRenda() {
  const v = parseFloat(document.getElementById('inputRenda').value);
  if (!v || v <= 0) return alert('Digite uma renda válida.');
  estado.renda = v;
  await salvarEstado();
  renderPagina();
}

// ── RENDER PAINEL ─────────────────────────────────────────
function renderPainel() {
  const t = calcTotais();
  const perc = t.totalDivida > 0 ? Math.min(100, ((estado.renda * 3 - t.totalDivida) / (estado.renda * 3)) * 100) : 100;
  const dataLivre = calcDataLivre(t.mesesParaLivre);
  const comprometido = estado.renda > 0 ? ((t.totalMensal / estado.renda) * 100).toFixed(0) : 0;

  if (!estado.renda || estado.dividas.length === 0) {
    return `<div class="vazio">
      <div class="vazio-icon">💳</div>
      <h3>Configure sua situação financeira</h3>
      <p style="margin-bottom:20px;font-size:13px;">Cadastre sua renda e suas dívidas para ver o painel completo</p>
      <button class="btn btn-primary" onclick="ir('situacao')">➕ Começar Agora</button>
    </div>`;
  }

  return `
    <div class="livre-banner">
      <h2>🎯 Previsão de Liberdade Financeira</h2>
      <div class="livre-data">${dataLivre}</div>
      <p>${t.mesesParaLivre} meses seguindo o plano</p>
    </div>

    <div class="kpi-grid">
      <div class="kpi" style="border-left-color:#ef4444;">
        <div class="kpi-label">Total em Dívidas</div>
        <div class="kpi-val" style="color:#f87171;">${fmt(t.totalDivida)}</div>
      </div>
      <div class="kpi" style="border-left-color:#f59e0b;">
        <div class="kpi-label">Parcelas/Mês</div>
        <div class="kpi-val" style="color:#fbbf24;">${fmt(t.totalMensal)}</div>
      </div>
      <div class="kpi" style="border-left-color:${t.sobra>=0?'#10b981':'#ef4444'};">
        <div class="kpi-label">Sobra por Mês</div>
        <div class="kpi-val" style="color:${t.sobra>=0?'#34d399':'#f87171'};">${fmt(t.sobra)}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 Comprometimento da Renda</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px;">
        <span>Renda: ${fmt(estado.renda)}</span>
        <span style="color:${comprometido>70?'#f87171':comprometido>50?'#fbbf24':'#34d399'};font-weight:700;">${comprometido}% comprometido</span>
      </div>
      <div class="progresso-bar">
        <div class="progresso-fill" style="width:${Math.min(comprometido,100)}%;background:${comprometido>70?'linear-gradient(90deg,#ef4444,#dc2626)':comprometido>50?'linear-gradient(90deg,#f59e0b,#d97706)':'linear-gradient(90deg,#7c3aed,#10b981)'};"></div>
      </div>
      ${comprometido > 70 ? `<div class="alerta alerta-warn" style="margin-top:12px;margin-bottom:0;">⚠️ Mais de 70% da renda está comprometida. Veja o Simulador para estratégias de alívio.</div>` : ''}
      ${t.sobra < 0 ? `<div class="alerta alerta-warn" style="margin-top:12px;margin-bottom:0;">🚨 Suas parcelas superam sua renda em ${fmt(Math.abs(t.sobra))}. Ação imediata necessária.</div>` : ''}
    </div>

    <div class="card">
      <div class="card-title">💳 Suas Dívidas</div>
      ${estado.dividas.map((d,i) => {
        const perc = Math.max(0, Math.min(100, 100 - ((d.total / (d.parcela * (d.parcelas||1))) * 100)));
        return `<div class="divida-item" style="border-left-color:${d.tipo==='cartao'?'#ef4444':d.tipo==='financiamento'?'#f59e0b':'#7c3aed'};">
          <div class="divida-header">
            <div class="divida-nome">${d.nome}</div>
            <div style="font-size:12px;color:var(--muted);">vence dia ${d.dia}</div>
          </div>
          <div class="progresso-bar"><div class="progresso-fill" style="width:${perc}%;"></div></div>
          <div class="divida-stats">
            <div class="divida-stat"><div class="divida-stat-val" style="color:#f87171;">${fmt(d.total)}</div><div class="divida-stat-label">Total Devido</div></div>
            <div class="divida-stat"><div class="divida-stat-val" style="color:#fbbf24;">${fmt(d.parcela)}</div><div class="divida-stat-label">Parcela/Mês</div></div>
            <div class="divida-stat"><div class="divida-stat-val" style="color:#a78bfa;">${d.juros||0}%</div><div class="divida-stat-label">Juros/Mês</div></div>
            <div class="divida-stat"><div class="divida-stat-val" style="color:#22d3ee;">${d.parcelas||'?'}</div><div class="divida-stat-label">Parcelas Rest.</div></div>
          </div>
        </div>`;
      }).join('')}
      <button class="btn btn-primary" style="margin-top:12px;" onclick="ir('situacao')">✏️ Gerenciar Dívidas</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <button class="btn btn-primary btn-full" onclick="ir('simulador')">⚖️ Ver Simulador</button>
      <button class="btn btn-success btn-full" onclick="ir('plano')">📅 Ver Plano Mês a Mês</button>
    </div>`;
}

// ── RENDER SITUAÇÃO ───────────────────────────────────────
function renderSituacao() {
  return `
    <div class="card">
      <div class="card-title">💰 Minha Renda Mensal</div>
      <div class="grid2" style="align-items:flex-end;">
        <div class="field" style="margin-bottom:0;">
          <label>Renda líquida mensal (R$)</label>
          <input type="number" id="inputRenda" value="${estado.renda||''}" placeholder="Ex: 3500.00" step="0.01">
        </div>
        <button class="btn btn-primary" onclick="salvarRenda()">💾 Salvar Renda</button>
      </div>
      ${estado.renda ? `<div class="alerta alerta-ok" style="margin-top:14px;margin-bottom:0;">✅ Renda atual: ${fmt(estado.renda)}/mês</div>` : ''}
    </div>

    <div class="card">
      <div class="card-title" style="justify-content:space-between;">
        <span>💳 Minhas Dívidas (${estado.dividas.length})</span>
        <button class="btn btn-primary" style="padding:8px 16px;font-size:13px;" onclick="abrirModal()">➕ Nova Dívida</button>
      </div>

      ${estado.dividas.length === 0 ? `
        <div class="alerta alerta-info">
          💡 Cadastre cada dívida com os valores reais para que o sistema calcule o melhor plano de pagamento.
        </div>
        <div class="vazio" style="padding:32px 0;">
          <div class="vazio-icon">📋</div>
          <p>Nenhuma dívida cadastrada ainda</p>
        </div>
      ` : estado.dividas.map((d,i) => `
        <div class="divida-item">
          <div class="divida-header">
            <div>
              <div class="divida-nome">${d.nome}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:3px;">${d.tipo} · Vence dia ${d.dia} · ${d.juros||0}% a.m.</div>
              ${d.obs ? `<div style="font-size:11px;color:#a78bfa;margin-top:3px;">💡 ${d.obs}</div>` : ''}
            </div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-danger" onclick="abrirModal(${i})">✏️</button>
              <button class="btn btn-danger" onclick="excluirDivida(${i})">🗑️</button>
            </div>
          </div>
          <div class="divida-stats">
            <div class="divida-stat"><div class="divida-stat-val" style="color:#f87171;">${fmt(d.total)}</div><div class="divida-stat-label">Total Devido</div></div>
            <div class="divida-stat"><div class="divida-stat-val" style="color:#fbbf24;">${fmt(d.parcela)}</div><div class="divida-stat-label">Parcela/Mês</div></div>
            <div class="divida-stat"><div class="divida-stat-val" style="color:#a78bfa;">${d.juros||0}%</div><div class="divida-stat-label">Juros/Mês</div></div>
            <div class="divida-stat"><div class="divida-stat-val" style="color:#22d3ee;">${d.parcelas}</div><div class="divida-stat-label">Parcelas Rest.</div></div>
          </div>
        </div>
      `).join('')}
    </div>

    ${estado.dividas.length > 0 ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button class="btn btn-primary btn-full" onclick="ir('simulador')">⚖️ Ver Simulador</button>
        <button class="btn btn-success btn-full" onclick="ir('plano')">📅 Ver Plano</button>
      </div>` : ''}`;
}

// ── RENDER SIMULADOR ──────────────────────────────────────
function renderSimulador() {
  if (!estado.renda || estado.dividas.length === 0) {
    return `<div class="vazio">
      <div class="vazio-icon">⚖️</div>
      <h3>Cadastre suas dívidas primeiro</h3>
      <p style="margin-bottom:20px;font-size:13px;">O simulador compara estratégias com base nas suas dívidas reais</p>
      <button class="btn btn-primary" onclick="ir('situacao')">➕ Cadastrar Dívidas</button>
    </div>`;
  }

  const t = calcTotais();
  const divOrdJuros = [...estado.dividas].sort((a,b) => (b.juros||0) - (a.juros||0));
  const divOrdSaldo = [...estado.dividas].sort((a,b) => (a.total||0) - (b.total||0));

  // Calcula economia do Avalanche vs pagar mínimo
  const jurosAtual = estado.dividas.reduce((s,d) => {
    return s + (d.total * ((d.juros||0)/100) * (d.parcelas||12));
  }, 0);
  const jurosAvalanche = jurosAtual * 0.72; // ~28% economia
  const economiaSim = jurosAtual - jurosAvalanche;

  // Simulação de antecipação (se tiver sobra)
  const sobra = t.sobra;
  const melhorAntecipar = [...estado.dividas].sort((a,b) => (b.juros||0) - (a.juros||0))[0];

  return `
    <div class="alerta alerta-info" style="margin-bottom:20px;">
      💡 Com <strong>${fmt(estado.renda)}</strong> de renda e <strong>${fmt(t.totalMensal)}</strong> em parcelas, você tem <strong style="color:${sobra>=0?'#34d399':'#f87171'}">${fmt(sobra)}</strong> de sobra por mês.
    </div>

    <div class="card">
      <div class="card-title">⚖️ Qual Estratégia Usar?</div>

      <!-- AVALANCHE -->
      <div class="sim-opcao melhor">
        <div class="sim-titulo">
          🔥 Método Avalanche — Ataque pelo Maior Juros
          <span class="badge-melhor">✅ RECOMENDADO</span>
        </div>
        <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">Pague o mínimo em todas e coloque a sobra na dívida com maior juros. Economiza mais dinheiro.</p>
        <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:12px;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;">Ordem de Ataque</div>
          ${divOrdJuros.map((d,i) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);${i===divOrdJuros.length-1?'border-bottom:none':''}">
              <div style="background:${i===0?'#7c3aed':'#1e1e2e'};color:#fff;font-weight:800;font-size:12px;padding:4px 10px;border-radius:6px;min-width:28px;text-align:center;">${i+1}º</div>
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;">${d.nome}</div>
                <div style="font-size:11px;color:var(--muted);">${fmt(d.total)} · ${d.juros||0}% a.m. · vence dia ${d.dia}</div>
              </div>
              ${i===0 ? `<div style="background:rgba(124,58,237,.2);color:#a78bfa;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;">FOCO AGORA</div>` : `<div style="color:var(--muted);font-size:12px;">mínimo</div>`}
            </div>`).join('')}
        </div>
        <div style="background:rgba(16,185,129,.1);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center;">
          <div><div style="font-size:12px;color:var(--muted);">Economia estimada em juros</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#34d399;">${fmt(economiaSim)}</div></div>
          <div style="text-align:right;"><div style="font-size:12px;color:var(--muted);">Livre em</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#34d399;">${calcDataLivre(Math.ceil(t.totalDivida/t.totalMensal))}</div></div>
        </div>
      </div>

      <!-- SNOWBALL -->
      <div class="sim-opcao">
        <div class="sim-titulo">
          ⛄ Método Bola de Neve — Ataque pelo Menor Saldo
          <span class="badge-pior">Motivacional</span>
        </div>
        <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">Pague o mínimo em todas e coloque a sobra na menor dívida. Termina mais rápido, mas paga mais juros.</p>
        <div style="background:var(--bg);border-radius:10px;padding:14px;">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;">Ordem de Ataque</div>
          ${divOrdSaldo.map((d,i) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);${i===divOrdSaldo.length-1?'border-bottom:none':''}">
              <div style="background:${i===0?'#06b6d4':'#1e1e2e'};color:#fff;font-weight:800;font-size:12px;padding:4px 10px;border-radius:6px;min-width:28px;text-align:center;">${i+1}º</div>
              <div style="flex:1;">
                <div style="font-weight:600;font-size:14px;">${d.nome}</div>
                <div style="font-size:11px;color:var(--muted);">${fmt(d.total)} · ${d.juros||0}% a.m.</div>
              </div>
              ${i===0 ? `<div style="background:rgba(6,182,212,.2);color:#22d3ee;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;">FOCO AGORA</div>` : `<div style="color:var(--muted);font-size:12px;">mínimo</div>`}
            </div>`).join('')}
        </div>
      </div>
    </div>

    ${sobra > 0 && melhorAntecipar ? `
    <div class="card">
      <div class="card-title">💡 Você tem ${fmt(sobra)} sobrando — O que fazer?</div>
      <div style="background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:18px;margin-bottom:12px;">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:8px;">🎯 Recomendação Personalizada</div>
        <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px;">
          Coloque os <strong style="color:#e2e8f0;">${fmt(sobra)}</strong> que sobram todo mês diretamente em <strong style="color:#a78bfa;">${melhorAntecipar.nome}</strong> 
          (${melhorAntecipar.juros||0}% a.m. — maior juros). Isso vai reduzir o saldo devedor mais rápido e economizar juros futuros.
        </p>
        <div style="background:var(--bg);border-radius:8px;padding:12px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;">
            <div><div style="color:var(--muted);font-size:11px;">Parcela normal</div><div style="font-weight:700;color:#f87171;">${fmt(melhorAntecipar.parcela)}</div></div>
            <div><div style="color:var(--muted);font-size:11px;">+ Sobra extra</div><div style="font-weight:700;color:#34d399;">+ ${fmt(sobra)}</div></div>
            <div><div style="color:var(--muted);font-size:11px;">Total a pagar/mês</div><div style="font-weight:700;color:#a78bfa;">${fmt(melhorAntecipar.parcela + sobra)}</div></div>
            <div><div style="color:var(--muted);font-size:11px;">Termina em</div><div style="font-weight:700;color:#22d3ee;">${Math.ceil(melhorAntecipar.total / (melhorAntecipar.parcela + sobra))} meses</div></div>
          </div>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="ir('plano')">📅 Ver Plano Mês a Mês Detalhado</button>
    </div>` : sobra < 0 ? `
    <div class="card">
      <div class="card-title">🚨 Situação Crítica — Suas parcelas superam sua renda</div>
      <div class="alerta alerta-warn" style="margin-bottom:14px;">
        Você está no vermelho em ${fmt(Math.abs(sobra))} por mês. Ação imediata necessária.
      </div>
      <div style="background:var(--bg);border-radius:10px;padding:16px;">
        <div style="font-weight:700;margin-bottom:10px;">O que fazer agora:</div>
        ${divOrdJuros.slice(0,2).map(d => `
          <div style="padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="font-weight:600;">${d.nome} — ${d.juros||0}% a.m.</div>
            <div style="font-size:12px;color:#fbbf24;margin-top:4px;">📞 Ligue e negocie: peça desconto de 30-50% para quitação à vista ou reduza a parcela mensal</div>
          </div>`).join('')}
      </div>
    </div>` : ''}`;
}

// ── RENDER PLANO MÊS A MÊS ───────────────────────────────
function renderPlano() {
  if (!estado.renda || estado.dividas.length === 0) {
    return `<div class="vazio">
      <div class="vazio-icon">📅</div>
      <h3>Cadastre suas dívidas primeiro</h3>
      <button class="btn btn-primary" style="margin-top:16px;" onclick="ir('situacao')">➕ Cadastrar</button>
    </div>`;
  }

  const t = calcTotais();
  const hoje = new Date();
  const mesesTotal = Math.min(t.mesesParaLivre + 1, 24);
  let dividasAtivas = estado.dividas.map(d => ({...d, saldoAtual: d.total}));
  const sobra = t.sobra;

  let html = `
    <div class="alerta alerta-info" style="margin-bottom:20px;">
      📅 Plano baseado na estratégia <strong>Avalanche</strong> — pagando mínimo em todas e direcionando a sobra para maior juros. Duração: <strong>${mesesTotal} meses</strong>.
    </div>`;

  for (let m = 0; m < mesesTotal; m++) {
    const data = new Date(hoje.getFullYear(), hoje.getMonth() + m, 1);
    const mesNome = `${MESES_FULL[data.getMonth()]} ${data.getFullYear()}`;
    
    // Ordena por maior juros para aplicar sobra
    const ativas = dividasAtivas.filter(d => d.saldoAtual > 0).sort((a,b) => (b.juros||0) - (a.juros||0));
    if (ativas.length === 0) break;

    let pagamentos = [];
    let totalMes = 0;
    let sobraRestante = sobra > 0 ? sobra : 0;

    ativas.forEach((d, idx) => {
      let valorPagar = Math.min(d.parcela, d.saldoAtual);
      // Coloca sobra na primeira (maior juros)
      if (idx === 0 && sobraRestante > 0) {
        valorPagar = Math.min(d.parcela + sobraRestante, d.saldoAtual);
      }
      totalMes += valorPagar;
      pagamentos.push({ ...d, valorPagar, ultima: valorPagar >= d.saldoAtual });
      // Atualiza saldo com juros
      const novoSaldo = (d.saldoAtual - valorPagar) * (1 + (d.juros||0)/100);
      dividasAtivas.find(x => x.id === d.id).saldoAtual = Math.max(0, novoSaldo);
    });

    const sobraDoMes = estado.renda - totalMes;

    html += `
      <div class="mes-bloco">
        <div class="mes-header">
          <div class="mes-titulo">📅 ${mesNome}</div>
          <div class="mes-saldo" style="color:${sobraDoMes>=0?'#34d399':'#f87171'};">Sobra: ${fmt(sobraDoMes)}</div>
        </div>
        ${pagamentos.map(p => `
          <div class="pagamento-item">
            <div class="pagamento-dia">${p.dia}</div>
            <div class="pagamento-info">
              <div class="pagamento-nome">${p.nome} ${p.ultima ? '<span style="background:rgba(16,185,129,.2);color:#34d399;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;">🎉 ÚLTIMA PARCELA</span>' : ''}</div>
              <div class="pagamento-detalhe">${p.idx===0&&sobra>0?`Parcela ${fmt(p.parcela)} + extra ${fmt(sobra)}`:`Parcela normal`} · Saldo restante após: ${fmt(Math.max(0, dividasAtivas.find(x=>x.id===p.id)?.saldoAtual||0))}</div>
            </div>
            <div class="pagamento-valor">${fmt(p.valorPagar)}</div>
          </div>`).join('')}
        <div class="mes-footer">
          <span>Total pago no mês: <strong style="color:#f87171;">${fmt(totalMes)}</strong></span>
          <span>Renda: ${fmt(estado.renda)} → Sobra: <strong style="color:${sobraDoMes>=0?'#34d399':'#f87171'}">${fmt(sobraDoMes)}</strong></span>
        </div>
      </div>`;
  }

  html += `
    <div style="background:linear-gradient(135deg,#10b981,#059669);border-radius:14px;padding:24px;text-align:center;margin-top:20px;">
      <div style="font-size:40px;margin-bottom:8px;">🎉</div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:6px;">Missão Cumprida!</div>
      <div style="color:rgba(255,255,255,.85);font-size:14px;">Seguindo este plano você estará livre das dívidas em <strong>${calcDataLivre(t.mesesParaLivre)}</strong></div>
    </div>`;

  return html;
}

// ── INIT ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await carregarEstado();
  renderPagina();
});
</script>
</body>
</html>
