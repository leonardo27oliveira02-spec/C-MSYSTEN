<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEGAVISION — Financial Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="megavision-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f; --surface:#111118; --border:#1e1e2e;
      --accent:#7c3aed; --cyan:#06b6d4; --gold:#f59e0b;
      --text:#e2e8f0; --muted:#94a3b8; --success:#10b981;
      --danger:#ef4444; --warn:#f59e0b;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

    /* NAV */
    .mv-nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;}
    .mv-nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
    .mv-nav-right{display:flex;align-items:center;gap:8px;}
    .mv-nav-right a{color:var(--muted);font-size:13px;text-decoration:none;padding:6px 12px;border-radius:8px;transition:all .2s;}
    .mv-nav-right a:hover{background:var(--border);color:var(--text);}
    .mv-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite;display:inline-block;margin-right:6px;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* MENU TABS */
    .menu-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto;position:sticky;top:60px;z-index:99;}
    .menu-tab{padding:14px 18px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
    .menu-tab:hover{color:var(--text);}
    .menu-tab.ativo{color:var(--accent);border-bottom-color:var(--accent);}

    /* MAIN */
    .main{max-width:1100px;margin:0 auto;padding:24px 20px 80px;}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;}
    .card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

    /* GRID */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

    /* KPI */
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
    .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
    .kpi-valor{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}

    /* DÍVIDA CARD COMPACTO */
    .divida-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .2s;}
    .divida-item:hover{border-color:var(--accent);background:rgba(124,58,237,.04);}
    .divida-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .divida-info{flex:1;min-width:0;}
    .divida-nome{font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .divida-detalhe{font-size:11px;color:var(--muted);margin-top:2px;}
    .divida-valores{text-align:right;flex-shrink:0;}
    .divida-parcela{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--danger);}
    .divida-total{font-size:11px;color:var(--muted);margin-top:2px;}
    .divida-progress{height:4px;background:var(--border);border-radius:4px;margin-top:8px;}
    .divida-progress-bar{height:4px;border-radius:4px;transition:width .5s;}
    .divida-acoes{display:flex;gap:6px;flex-shrink:0;}
    .btn-pagar{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-pagar:hover{background:rgba(16,185,129,.25);}
    .btn-pagar.pago{background:rgba(16,185,129,.25);color:#34d399;}
    .btn-del{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

    /* BOTÕES */
    .btn{padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;border:none;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#6d28d9;}
    .btn-success{background:var(--success);color:#fff;}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .btn-outline:hover{border-color:var(--accent);color:var(--text);}
    .btn-sm{padding:7px 14px;font-size:12px;}
    .btn-lg{padding:14px 28px;font-size:15px;font-weight:700;}

    /* INPUTS */
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
    .field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
    .field input:focus,.field select:focus{border-color:var(--accent);}
    .field input::placeholder{color:#475569;}
    .field select option{background:var(--surface);}

    /* MODAL */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px;}
    .modal.ativo{display:flex;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
    .modal-header{background:linear-gradient(135deg,var(--accent),#4f46e5);padding:20px 24px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;}
    .modal-header h3{font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:17px;}
    .modal-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:24px;cursor:pointer;line-height:1;}
    .modal-body{padding:24px;}

    /* SIMULADOR */
    .sim-opcao{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .3s;}
    .sim-opcao:hover,.sim-opcao.melhor{border-color:var(--success);}
    .sim-opcao.neutro{border-color:var(--warn);}
    .sim-opcao.pior{border-color:var(--danger);}
    .sim-tag{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-bottom:10px;}

    /* PLANO MÊS */
    .mes-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
    .mes-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .2s;}
    .mes-header:hover{background:rgba(124,58,237,.06);}
    .mes-body{padding:0 16px 14px;display:none;}
    .mes-body.aberto{display:block;}
    .mes-pagamento{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .mes-pagamento:last-child{border-bottom:none;}

    /* BADGE */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}

    /* ALERTA */
    .alerta{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;}
    .alerta-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24;}
    .alerta-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399;}
    .alerta-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;}

    /* CHART CONTAINER */
    .chart-wrap{position:relative;height:200px;display:flex;align-items:center;justify-content:center;}

    /* EMPTY STATE */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);}
    .empty-icon{font-size:48px;margin-bottom:12px;}
    .empty h3{font-family:'Syne',sans-serif;color:var(--text);margin-bottom:8px;}

    /* RENDA BANNER */
    .renda-banner{background:linear-gradient(135deg,#1a0533,#0d1f3c);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .renda-info label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
    .renda-valor{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;margin-top:2px;}
    .renda-livre{font-size:13px;margin-top:4px;}

    @media(max-width:700px){
      .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
      .mv-nav-right a:not(:last-child){display:none;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="mv-nav">
  <a href="index.html" class="mv-nav-logo">⚡ MEGAVISION</a>
  <div class="mv-nav-right">
    <span><span class="mv-dot" id="mvDot"></span><span id="mvStatus" style="font-size:12px;color:var(--muted);">...</span></span>
    <a href="index.html">← Início</a>
  </div>
</nav>

<!-- MENU -->
<div class="menu-tabs">
  <button class="menu-tab ativo" onclick="trocarAba('dashboard')">📊 Dashboard</button>
  <button class="menu-tab" onclick="trocarAba('dividas')">💳 Minhas Dívidas</button>
  <button class="menu-tab" onclick="trocarAba('simulador')">🧮 Simulador</button>
  <button class="menu-tab" onclick="trocarAba('plano')">📅 Plano de Ação</button>
</div>

<!-- MODAIS -->
<div id="modalDivida" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>➕ Nova Dívida</h3>
      <button class="modal-close" onclick="fecharModal('modalDivida')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Nome da Dívida</label><input id="dNome" placeholder="Ex: Cartão Nubank"></div>
      <div class="grid-2">
        <div class="field"><label>Valor Total (R$)</label><input id="dTotal" type="number" placeholder="5000"></div>
        <div class="field"><label>Valor Pago até hoje (R$)</label><input id="dPago" type="number" placeholder="0" value="0"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Parcela Mensal (R$)</label><input id="dParcela" type="number" placeholder="350"></div>
        <div class="field"><label>Juros ao mês (%)</label><input id="dJuros" type="number" placeholder="2.5" step="0.1"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Dia do Vencimento</label><input id="dDia" type="number" placeholder="10" min="1" max="31"></div>
        <div class="field"><label>Tipo</label>
          <select id="dTipo">
            <option value="cartao">💳 Cartão de Crédito</option>
            <option value="financiamento">🏍️ Financiamento</option>
            <option value="emprestimo">💰 Empréstimo</option>
            <option value="cheque">📋 Cheque Especial</option>
            <option value="outros">📌 Outros</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" style="width:100%;margin-top:6px;" onclick="salvarDivida()">💾 Salvar Dívida</button>
    </div>
  </div>
</div>

<div id="modalRenda" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>💰 Minha Renda</h3>
      <button class="modal-close" onclick="fecharModal('modalRenda')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Renda Mensal Líquida (R$)</label><input id="rRendaMensal" type="number" placeholder="3000"></div>
      <div class="field"><label>Outras Receitas (R$)</label><input id="rOutras" type="number" placeholder="0" value="0"></div>
      <div class="field"><label>Gastos Fixos essenciais (R$)</label><input id="rGastos" type="number" placeholder="1200"><small style="color:var(--muted);font-size:11px;">Aluguel, alimentação, transporte, etc.</small></div>
      <button class="btn btn-primary btn-lg" style="width:100%;margin-top:10px;" onclick="salvarRenda()">💾 Salvar</button>
    </div>
  </div>
</div>

<div id="modalSimQuitacao" class="modal">
  <div class="modal-box" style="max-width:600px;">
    <div class="modal-header">
      <h3>🧮 Simular Quitação</h3>
      <button class="modal-close" onclick="fecharModal('modalSimQuitacao')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Quanto você tem disponível agora (R$)</label><input id="simGrana" type="number" placeholder="2000" oninput="calcularSimulacao()"></div>
      <div id="simResultados" style="margin-top:16px;"></div>
    </div>
  </div>
</div>

<!-- CONTEÚDO PRINCIPAL -->
<div class="main" id="mainContent"></div>

<script>
// ─── ESTADO GLOBAL ────────────────────────────────────────────
let estado = {
  aba: 'dashboard',
  dividas: [],
  renda: { mensal: 0, outras: 0, gastos: 0 },
  mesAberto: null
};

const CORES_TIPO = {
  cartao:       { bg:'rgba(239,68,68,.15)',  cor:'#f87171',  icon:'💳' },
  financiamento:{ bg:'rgba(245,158,11,.15)', cor:'#fbbf24',  icon:'🏍️' },
  emprestimo:   { bg:'rgba(124,58,237,.15)', cor:'#a78bfa',  icon:'💰' },
  cheque:       { bg:'rgba(6,182,212,.15)',  cor:'#22d3ee',  icon:'📋' },
  outros:       { bg:'rgba(148,163,184,.15)',cor:'#94a3b8',  icon:'📌' }
};

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  await carregarDados();
  render();
  atualizarStatus();
}

function atualizarStatus() {
  const s = MVData.status();
  document.getElementById('mvDot').style.background = s.online ? '#10b981' : '#ef4444';
  document.getElementById('mvStatus').textContent = s.online ? 'Online' : 'Offline';
}

// ─── DADOS ────────────────────────────────────────────────────
async function carregarDados() {
  try {
    const d = await MVData.buscar('financeiro', { tipo: 'dividas_v2' });
    if (d.length) estado.dividas = d[0].dados || [];
    const r = await MVData.buscar('financeiro', { tipo: 'renda_v2' });
    if (r.length) estado.renda = r[0].dados || { mensal:0, outras:0, gastos:0 };
  } catch(e) {
    const d = localStorage.getItem('mv_dividas');
    const r = localStorage.getItem('mv_renda');
    if (d) estado.dividas = JSON.parse(d);
    if (r) estado.renda = JSON.parse(r);
  }
}

async function salvarDados() {
  try {
    await MVData.salvar('financeiro', { tipo:'dividas_v2', dados: estado.dividas });
    await MVData.salvar('financeiro', { tipo:'renda_v2',   dados: estado.renda   });
  } catch(e) {}
  localStorage.setItem('mv_dividas', JSON.stringify(estado.dividas));
  localStorage.setItem('mv_renda',   JSON.stringify(estado.renda));
}

// ─── MODAIS ───────────────────────────────────────────────────
function abrirModal(id)  { document.getElementById(id).classList.add('ativo'); }
function fecharModal(id) { document.getElementById(id).classList.remove('ativo'); }

async function salvarDivida() {
  const nome    = document.getElementById('dNome').value.trim();
  const total   = parseFloat(document.getElementById('dTotal').value)   || 0;
  const pago    = parseFloat(document.getElementById('dPago').value)    || 0;
  const parcela = parseFloat(document.getElementById('dParcela').value) || 0;
  const juros   = parseFloat(document.getElementById('dJuros').value)   || 0;
  const dia     = parseInt(document.getElementById('dDia').value)       || 1;
  const tipo    = document.getElementById('dTipo').value;
  if (!nome || !total || !parcela) { alert('Preencha nome, valor total e parcela!'); return; }
  const restante = Math.max(total - pago, 0);
  const mesesRestantes = parcela > 0 ? Math.ceil(restante / parcela) : 0;
  estado.dividas.push({ id: Date.now(), nome, total, pago, parcela, juros, dia, tipo, restante, mesesRestantes, pagamentos: [], criado_em: new Date().toISOString() });
  await salvarDados();
  fecharModal('modalDivida');
  ['dNome','dTotal','dPago','dParcela','dJuros','dDia'].forEach(id => document.getElementById(id).value = '');
  render();
}

async function salvarRenda() {
  estado.renda = {
    mensal:  parseFloat(document.getElementById('rRendaMensal').value) || 0,
    outras:  parseFloat(document.getElementById('rOutras').value)      || 0,
    gastos:  parseFloat(document.getElementById('rGastos').value)      || 0
  };
  await salvarDados();
  fecharModal('modalRenda');
  render();
}

async function excluirDivida(id) {
  if (!confirm('Excluir esta dívida?')) return;
  estado.dividas = estado.dividas.filter(d => d.id !== id);
  await salvarDados();
  render();
}

async function togglePagamento(id) {
  const d = estado.dividas.find(d => d.id === id);
  if (!d) return;
  const mesAtual = new Date().toISOString().slice(0,7);
  const idx = d.pagamentos.indexOf(mesAtual);
  if (idx === -1) {
    d.pagamentos.push(mesAtual);
    d.pago = Math.min(d.pago + d.parcela, d.total);
    d.restante = Math.max(d.total - d.pago, 0);
    d.mesesRestantes = d.parcela > 0 ? Math.ceil(d.restante / d.parcela) : 0;
  } else {
    d.pagamentos.splice(idx, 1);
    d.pago = Math.max(d.pago - d.parcela, 0);
    d.restante = Math.max(d.total - d.pago, 0);
    d.mesesRestantes = d.parcela > 0 ? Math.ceil(d.restante / d.parcela) : 0;
  }
  await salvarDados();
  render();
}

// ─── CÁLCULOS ─────────────────────────────────────────────────
function calcTotais() {
  const totalDividas  = estado.dividas.reduce((s,d) => s + d.total, 0);
  const totalRestante = estado.dividas.reduce((s,d) => s + d.restante, 0);
  const totalPago     = estado.dividas.reduce((s,d) => s + d.pago, 0);
  const parcMensal    = estado.dividas.reduce((s,d) => s + d.parcela, 0);
  const rendaTotal    = estado.renda.mensal + estado.renda.outras;
  const rendaLivre    = rendaTotal - estado.renda.gastos - parcMensal;
  const pctComprometido = rendaTotal > 0 ? ((parcMensal + estado.renda.gastos) / rendaTotal * 100) : 0;
  const mesAtual = new Date().toISOString().slice(0,7);
  const pagoEsteMes = estado.dividas.filter(d => d.pagamentos.includes(mesAtual)).reduce((s,d) => s + d.parcela, 0);
  return { totalDividas, totalRestante, totalPago, parcMensal, rendaTotal, rendaLivre, pctComprometido, pagoEsteMes };
}

function gerarPlanoAtaque(estrategia = 'avalanche') {
  if (!estado.dividas.length) return [];
  let dividas = estado.dividas.filter(d => d.restante > 0).map(d => ({...d}));
  if (estrategia === 'avalanche') dividas.sort((a,b) => b.juros - a.juros);
  if (estrategia === 'snowball')  dividas.sort((a,b) => a.restante - b.restante);
  const t = calcTotais();
  const extra = Math.max(t.rendaLivre, 0);
  const plano = [];
  let mes = 1;
  while (dividas.some(d => d.restante > 0) && mes <= 60) {
    const pagamentos = [];
    let extraDisponivel = extra;
    dividas.forEach((d, i) => {
      if (d.restante <= 0) return;
      let pag = d.parcela;
      if (i === 0 && extraDisponivel > 0) { pag += extraDisponivel; extraDisponivel = 0; }
      pag = Math.min(pag, d.restante);
      d.restante = Math.max(d.restante - pag, 0);
      pagamentos.push({ nome: d.nome, valor: pag, restante: d.restante, dia: d.dia, tipo: d.tipo });
    });
    const data = new Date();
    data.setMonth(data.getMonth() + mes - 1);
    plano.push({
      mes,
      label: data.toLocaleDateString('pt-BR', { month:'long', year:'numeric' }),
      pagamentos,
      totalPago: pagamentos.reduce((s,p) => s + p.valor, 0),
      dividasAtivas: dividas.filter(d => d.restante > 0).length
    });
    mes++;
    dividas = dividas.filter(d => d.restante > 0);
  }
  return plano;
}

function calcularSimulacao() {
  const grana = parseFloat(document.getElementById('simGrana').value) || 0;
  const div = document.getElementById('simResultados');
  if (!grana || !estado.dividas.length) { div.innerHTML = ''; return; }
  const dividas = estado.dividas.filter(d => d.restante > 0).sort((a,b) => b.juros - a.juros);
  const cenarios = [];

  // Cenário 1: Maior juros
  const c1 = dividas[0];
  if (c1) {
    const quitaTotal = grana >= c1.restante;
    const economiaJuros = quitaTotal ? (c1.mesesRestantes * c1.restante * c1.juros/100) : (grana * c1.juros/100 * 12);
    cenarios.push({ tag:'🔥 Melhor opção', classe:'melhor', tagCor:'#34d399', tagBg:'rgba(16,185,129,.2)', titulo: quitaTotal ? `Quitar ${c1.nome} (R$ ${fmt(c1.restante)})` : `Abater R$ ${fmt(grana)} em ${c1.nome}`, economia:`Economiza ~R$ ${fmt(economiaJuros)} em juros`, detalhe: quitaTotal ? `✅ Quita totalmente! Parcela de R$ ${fmt(c1.parcela)}/mês liberada` : `Reduz saldo de R$ ${fmt(c1.restante)} → R$ ${fmt(c1.restante-grana)}`, impacto: c1.juros });
  }

  // Cenário 2: Menor saldo
  const c2 = [...dividas].sort((a,b) => a.restante - b.restante)[0];
  if (c2 && c2 !== c1) {
    const quitaTotal = grana >= c2.restante;
    cenarios.push({ tag: quitaTotal ? '✅ Elimina dívida' : '⚡ Alternativa', classe: quitaTotal ? 'melhor' : 'neutro', tagCor: quitaTotal ? '#34d399':'#fbbf24', tagBg: quitaTotal ? 'rgba(16,185,129,.2)':'rgba(245,158,11,.2)', titulo: quitaTotal ? `Quitar ${c2.nome} (R$ ${fmt(c2.restante)})` : `Abater em ${c2.nome}`, economia: quitaTotal ? `Libera R$ ${fmt(c2.parcela)}/mês` : `Reduz saldo`, detalhe: quitaTotal ? `Parcela de R$ ${fmt(c2.parcela)}/mês fica livre para atacar próxima dívida` : `Saldo de R$ ${fmt(c2.restante)} → R$ ${fmt(c2.restante-grana)}`, impacto: c2.juros });
  }

  // Cenário 3: Guardar como reserva
  cenarios.push({ tag:'⚠️ Menos indicado', classe:'pior', tagCor:'#f87171', tagBg:'rgba(239,68,68,.15)', titulo:'Guardar como reserva', economia:'Sem economia em juros', detalhe:`Suas dívidas continuam gerando juros enquanto o dinheiro rende menos`, impacto: 0 });

  div.innerHTML = cenarios.map(c => `
    <div class="sim-opcao ${c.classe}" style="margin-bottom:12px;">
      <div><span class="sim-tag" style="background:${c.tagBg};color:${c.tagCor};">${c.tag}</span></div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px;">${c.titulo}</div>
      <div style="font-size:13px;color:#34d399;margin-bottom:4px;">💰 ${c.economia}</div>
      <div style="font-size:12px;color:var(--muted);">${c.detalhe}</div>
    </div>`).join('');
}

function renderGraficos() {
  if (!estado.dividas.length) return;

  // Pizza
  const ctx1 = document.getElementById('chartPizza');
  if (ctx1) {
    const labels = estado.dividas.map(d => d.nome);
    const valores = estado.dividas.map(d => d.restante);
    const cores = estado.dividas.map(d => (CORES_TIPO[d.tipo]||CORES_TIPO.outros).cor);
    new Chart(ctx1, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: valores, backgroundColor: cores, borderWidth: 2, borderColor: '#111118' }] },
      options: { responsive:true, maintainAspectRatio:false, plugins: { legend:{ position:'right', labels:{ color:'#94a3b8', font:{size:11}, boxWidth:12 } } } }
    });
  }

  // Linha — projeção
  const ctx2 = document.getElementById('chartLinha');
  if (ctx2) {
    const plano = gerarPlanoAtaque();
    const labels = plano.slice(0,12).map(p => p.label.split(' ')[0].substring(0,3));
    const valores = plano.slice(0,12).map((p,i,arr) => {
      const t = calcTotais();
      const pago = arr.slice(0,i+1).reduce((s,x)=>s+x.totalPago,0);
      return Math.max(t.totalRestante - pago, 0);
    });
    new Chart(ctx2, {
      type: 'line',
      data: { labels, datasets: [{ label:'Dívida Restante', data: valores, borderColor:'#7c3aed', backgroundColor:'rgba(124,58,237,.1)', fill:true, tension:.4, pointBackgroundColor:'#7c3aed', pointRadius:4 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{color:'#94a3b8',font:{size:10}}, grid:{color:'#1e1e2e'} }, y:{ ticks:{color:'#94a3b8',font:{size:10},callback:v=>`R$${(v/1000).toFixed(0)}k`}, grid:{color:'#1e1e2e'} } } }
    });
  }
}

function calcularSim2() {
  const grana = parseFloat(document.getElementById('simGrana2')?.value) || 0;
  const div = document.getElementById('simResultados2');
  if (!div) return;
  if (!grana || !estado.dividas.length) { div.innerHTML = ''; return; }
  const dividas = estado.dividas.filter(d => d.restante > 0).sort((a,b) => b.juros - a.juros);
  const cenarios = [];
  dividas.forEach(d => {
    const quitaTotal = grana >= d.restante;
    const economiaJuros = quitaTotal
      ? (d.mesesRestantes * d.restante * d.juros / 100).toFixed(2)
      : (grana * d.juros / 100 * 12).toFixed(2);
    cenarios.push({ d, quitaTotal, economiaJuros: parseFloat(economiaJuros) });
  });
  cenarios.sort((a,b) => b.economiaJuros - a.economiaJuros);
  div.innerHTML = cenarios.slice(0,3).map((c,i) => {
    const cor = i===0?'melhor':i===1?'neutro':'pior';
    const tag = i===0?'🏆 Melhor opção':i===1?'⚡ Alternativa':'📌 Outra opção';
    const tagCor = i===0?'#34d399':i===1?'#fbbf24':'#94a3b8';
    const tagBg  = i===0?'rgba(16,185,129,.15)':i===1?'rgba(245,158,11,.15)':'rgba(148,163,184,.1)';
    return `
    <div class="sim-opcao ${cor}" style="margin-bottom:10px;">
      <span class="sim-tag" style="background:${tagBg};color:${tagCor};">${tag}</span>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px;">
        ${c.quitaTotal ? `✅ Quitar ${c.d.nome}` : `Abater R$ ${fmt(grana)} em ${c.d.nome}`}
      </div>
      <div style="font-size:13px;color:#34d399;margin-bottom:4px;">💰 Economiza ~R$ ${fmt(c.economiaJuros)} em juros</div>
      <div style="font-size:12px;color:var(--muted);">
        ${c.quitaTotal
          ? `Libera R$ ${fmt(c.d.parcela)}/mês · ${c.d.juros}% a.m. eliminado`
          : `Saldo: R$ ${fmt(c.d.restante)} → R$ ${fmt(Math.max(c.d.restante-grana,0))} · Juros: ${c.d.juros}% a.m.`}
      </div>
    </div>`}).join('');
}

    ${estrategia==='avalanche'
      ? '🔥 <strong>Avalanche:</strong> Atacando maior juros primeiro. Economiza o máximo em juros.'
      : '❄️ <strong>Snowball:</strong> Quitando menor dívida primeiro. Gera motivação progressiva.'}
  </div>

  ${plano.map((m,i) => `
    <div class="mes-card">
      <div class="mes-header" onclick="toggleMes(${i})">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="background:${m.dividasAtivas===0?'rgba(16,185,129,.15)':'rgba(124,58,237,.15)'};color:${m.dividasAtivas===0?'#34d399':'#a78bfa'};width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;">${m.mes}</div>
          <div>
            <div style="font-weight:700;font-size:14px;color:var(--text);text-transform:capitalize;">${m.label}</div>
            <div style="font-size:12px;color:var(--muted);">${m.pagamentos.length} pagamento(s) · ${m.dividasAtivas} dívida(s) restante(s)</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Syne',sans-serif;font-weight:800;color:#f87171;">R$ ${fmt(m.totalPago)}</div>
          <div style="font-size:11px;color:var(--muted);">a pagar</div>
        </div>
      </div>
      <div class="mes-body ${i===0?'aberto':''}" id="mes_${i}">
        ${m.pagamentos.map(p => {
          const c = CORES_TIPO[p.tipo]||CORES_TIPO.outros;
          return `
          <div class="mes-pagamento">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:16px;">${c.icon}</span>
              <div>
                <div style="font-weight:600;color:var(--text);">${p.nome}</div>
                <div style="font-size:11px;color:var(--muted);">📅 Pagar até dia ${p.dia}</div>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-weight:700;color:#f87171;">R$ ${fmt(p.valor)}</div>
              ${p.restante > 0 ? `<div style="font-size:11px;color:var(--muted);">Restam R$ ${fmt(p.restante)}</div>` : `<div style="font-size:11px;color:#34d399;">✅ Quitado!</div>`}
            </div>
          </div>`}).join('')}
        ${m.dividasAtivas === 0 ? `<div style="text-align:center;padding:12px;color:#34d399;font-weight:600;">🎉 Todas as dívidas quitadas!</div>` : ''}
      </div>
    </div>`).join('')}`;
}

function toggleMes(i) {
  const el = document.getElementById(`mes_${i}`);
  if (el) el.classList.toggle('aberto');
}

// ─── START ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>

<footer style="background:var(--surface);border-top:1px solid var(--border);padding:20px;text-align:center;font-size:12px;color:var(--muted);">
  <span style="background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;">MEGAVISION ECOSYSTEM</span> © 2026
</footer>
</body>
</html>
